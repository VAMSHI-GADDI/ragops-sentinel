name: RAGOps Sentinel CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Tests and validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          python -m pytest

      - name: Validate Kubernetes manifests
        run: |
          python scripts/validate_kubernetes_manifests.py --manifest-dir infra/kubernetes/base

      - name: Validate Airflow DAG
        run: |
          python scripts/validate_airflow_dag.py

      - name: Validate Spark preprocessing job
        run: |
          python scripts/validate_spark_job.py

      - name: Validate security guardrails
        run: |
          python scripts/validate_security_guardrails.py

      - name: Validate LLM providers
        run: |
          python scripts/validate_llm_providers.py

      - name: Validate fine-tuning dataset
        run: |
          python scripts/validate_fine_tuning_dataset.py

      - name: Prepare fine-tuning artifacts
        run: |
          python scripts/prepare_fine_tuning_artifacts.py

      - name: Run inference benchmark
        run: |
          python scripts/run_inference_benchmark.py

      - name: Validate deployment packaging
        run: |
          python scripts/validate_deployment_packaging.py

      - name: Validate release package
        run: |
          python scripts/validate_release_package.py

      - name: Generate research artifacts
        run: |
          python scripts/generate_research_artifacts.py

  docker-build:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build API Docker image
        run: |
          docker build -t ragops-sentinel-api:ci .
