name: RAGOps Sentinel CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Tests and validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          python -m pytest

      - name: Validate Kubernetes manifests
        run: |
          python scripts/validate_kubernetes_manifests.py --manifest-dir infra/kubernetes/base

      - name: Generate research artifacts
        run: |
          python scripts/generate_research_artifacts.py

  docker-build:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build API Docker image
        run: |
          docker build -t ragops-sentinel-api:ci .
