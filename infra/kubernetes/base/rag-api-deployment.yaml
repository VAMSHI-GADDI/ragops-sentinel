apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: ragops-sentinel
  labels:
    app.kubernetes.io/name: rag-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ragops-sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rag-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: ragops-sentinel
    spec:
      containers:
        - name: rag-api
          image: ragops-sentinel-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: ragops-app-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
