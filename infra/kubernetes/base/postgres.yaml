apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ragops-sentinel
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: metadata-db
    app.kubernetes.io/part-of: ragops-sentinel
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: ragops-sentinel
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: metadata-db
    app.kubernetes.io/part-of: ragops-sentinel
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: metadata-db
        app.kubernetes.io/part-of: ragops-sentinel
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
