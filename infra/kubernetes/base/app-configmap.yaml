apiVersion: v1
kind: ConfigMap
metadata:
  name: ragops-app-config
  namespace: ragops-sentinel
  labels:
    app.kubernetes.io/name: ragops-sentinel
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ragops-sentinel
data:
  APP_ENV: "kubernetes"
  QDRANT_URL: "http://qdrant:6333"
  DATABASE_URL: "postgresql+psycopg://ragops:ragops@postgres:5432/ragops"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  RAGOPS_COLLECTION_NAME: "ragops_chunks"
