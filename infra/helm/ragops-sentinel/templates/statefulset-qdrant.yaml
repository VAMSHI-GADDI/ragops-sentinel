{{- if .Values.qdrant.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ragops-sentinel.fullname" . }}-qdrant
  labels:
    {{- include "ragops-sentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  serviceName: {{ include "ragops-sentinel.fullname" . }}-qdrant
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ragops-sentinel.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: qdrant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ragops-sentinel.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: qdrant
    spec:
      containers:
        - name: qdrant
          image: {{ .Values.qdrant.image | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.qdrant.port }}
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: qdrant-storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.qdrant.storageSize }}
{{- end }}
